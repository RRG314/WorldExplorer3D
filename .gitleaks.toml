title = "WorldExplorer Secret Scan Config"

[extend]
useDefault = true

[[allowlists]]
description = "Firebase web config key paths (public client key expected)"
paths = [
  '''js/firebase-project-config\.js''',
  '''public/js/firebase-project-config\.js'''
]

[[allowlists]]
description = "Documentation placeholders only (not real credentials)"
regexes = [
  '''sk_(live|test)_\.\.\.''',
  '''whsec_\.\.\.''',
  '''price_\.\.\.'''
]
