name: Runtime Verify

on:
  pull_request:
  push:
    branches:
      - main
      - steven/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (runtime tests)
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Mirror parity + runtime verification
        run: npm run release:verify
